<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Upload Santuarios</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      background: #f8f9ff;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f0f1ff;
    }

    .upload-area.dragging {
      border-color: #764ba2;
      background: #e8e9ff;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    input[type="file"] {
      display: none;
    }

    .file-info {
      margin: 20px 0;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 10px;
      display: none;
    }

    .file-info.active {
      display: block;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      display: none;
    }

    .result.active {
      display: block;
    }

    .result.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .result.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }

    .result pre {
      background: rgba(0,0,0,0.05);
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      margin-top: 10px;
    }

    .preview {
      margin-top: 20px;
      text-align: center;
    }

    .preview img, .preview video {
      max-width: 100%;
      max-height: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .actions button {
      flex: 1;
    }

    .btn-secondary {
      background: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏛️ Santuarios - Test de Carga</h1>
    <p class="subtitle">Prueba el microservicio de subida de archivos</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <h3>Arrastra un archivo aquí</h3>
      <p>o haz clic para seleccionar</p>
      <p style="margin-top: 10px; font-size: 12px; color: #999;">
        Imágenes: JPG, PNG, WebP, GIF (máx. 50MB)<br>
        Videos: MP4, WebM, MOV (máx. 200MB)
      </p>
      <input type="file" id="fileInput" accept="image/*,video/*">
    </div>

    <div class="file-info" id="fileInfo">
      <strong>Archivo seleccionado:</strong>
      <div id="fileName"></div>
    </div>

    <button id="uploadBtn" onclick="uploadFile()" disabled>
      Subir Archivo
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 10px;">Subiendo archivo...</p>
    </div>

    <div class="result" id="result"></div>

    <div class="actions" id="actions" style="display: none;">
      <button class="btn-secondary" onclick="location.reload()">
        Subir Otro Archivo
      </button>
      <button onclick="copyUrl()">
        Copiar URL
      </button>
    </div>
  </div>

  <script>
    let selectedFile = null;
    let uploadedUrl = null;
    const API_URL = window.location.origin;

    // Elementos del DOM
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const actions = document.getElementById('actions');

    // Click en el área de upload
    uploadArea.addEventListener('click', () => {
      fileInput.click();
    });

    // Selección de archivo
    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragging');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragging');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragging');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;

      selectedFile = file;
      fileName.textContent = `${file.name} (${formatFileSize(file.size)})`;
      fileInfo.classList.add('active');
      uploadBtn.disabled = false;
      result.classList.remove('active');
    }

    async function uploadFile() {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('file', selectedFile);

      uploadBtn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const response = await fetch(`${API_URL}/api/upload`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        loading.classList.remove('active');
        result.classList.add('active');

        if (data.success) {
          uploadedUrl = data.data.publicUrl;
          result.className = 'result active success';
          result.innerHTML = `
            <h3>✅ Archivo subido exitosamente</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
            <div class="preview">
              ${data.data.fileType === 'image' 
                ? `<img src="${data.data.publicUrl}" alt="Preview">` 
                : `<video controls src="${data.data.publicUrl}"></video>`
              }
            </div>
          `;
          actions.style.display = 'flex';
        } else {
          result.className = 'result active error';
          result.innerHTML = `
            <h3>❌ Error al subir archivo</h3>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          uploadBtn.disabled = false;
        }
      } catch (error) {
        loading.classList.remove('active');
        result.className = 'result active error';
        result.classList.add('active');
        result.innerHTML = `
          <h3>❌ Error de conexión</h3>
          <p>${error.message}</p>
        `;
        uploadBtn.disabled = false;
      }
    }

    function copyUrl() {
      if (uploadedUrl) {
        navigator.clipboard.writeText(uploadedUrl);
        alert('URL copiada al portapapeles');
      }
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }
  </script>
</body>
</html>
